{% extends 'task/base.html' %}

{% block title %}Delete Task '{{ task.title }}'{% endblock %}

{% block content %}
    <section class="mx-auto max-w-2xl rounded-2xl border border-rose-200 bg-white p-5 shadow-sm dark:border-rose-900 dark:bg-slate-900 sm:p-8">
        <p class="text-xs font-bold uppercase tracking-[0.2em] text-rose-600 dark:text-rose-300">Confirm Action</p>
        <h2 class="mt-2 font-display text-3xl font-bold leading-tight text-slate-900 dark:text-white sm:text-[2rem]">Delete Task</h2>
        <p class="mt-3 text-sm text-slate-600 dark:text-slate-300">Are you sure you want to delete <span class="font-semibold">{{ task.title }}</span>? This action cannot be undone.</p>

        <form method="post" action="{% url 'delete_task' task.id %}" class="mt-6 flex flex-col gap-2 sm:flex-row">
            {% csrf_token %}
            <button type="submit" class="inline-flex h-11 items-center justify-center rounded-xl bg-rose-600 px-5 text-sm font-bold text-white shadow-sm transition hover:bg-rose-700">Yes, Delete</button>
            <a href="{% url 'task_list' %}" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-300 px-5 text-sm font-bold text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Cancel</a>
        </form>
    </section>
{% endblock %}
