{% extends 'task/base.html' %}

{% block title %}Delete Task '{{ task.title }}'{% endblock %}

{% block content %}
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Delete Task '{{ task.title }}'</h2>
    <div class="bg-white shadow-sm rounded-lg p-6">
        <p class="text-gray-600 mb-4">Are you sure you want to delete the task "{{ task.title }}"?</p>
        <form method="post" action="{% url 'delete_task' task.id %}">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">Yes, Delete</button>
            <a href="{% url 'task_list' %}" class="ml-4 bg-gray-300 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-400">Cancel</a>
        </form>
    </div>
{% endblock %}
